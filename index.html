<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>stanley/stella · grossiste & marquage textile paris · atelier amelot</title>
  <meta name="description" content="200+ références stanley/stella en stock paris. bio coton, certifié gots/oeko-tex. marquage intégré, devis sous 1h, livraison 48h.">

  <link rel="stylesheet" href="brand-page.css">
  <link rel="stylesheet" href="responsive.css">

  <!-- Open Graph (template B) -->
  <meta property="og:title" content="stanley/stella · atelier amelot">
  <meta property="og:description" content="200+ références bio-coton stanley/stella distribuées depuis paris 11. marquage intégré, devis 1h, livraison 48h.">
  <meta property="og:type" content="website">

  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel · pinned versions per project conventions -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components -->
  <script type="text/babel" src="components/tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/Chrome.jsx"></script>
  <script type="text/babel" src="components/data.jsx"></script>
  <script type="text/babel" src="components/BrandHero.jsx"></script>
  <script type="text/babel" src="components/FilterBar.jsx"></script>
  <script type="text/babel" src="components/BrandProductCard.jsx"></script>
  <script type="text/babel" src="components/BestSellers.jsx"></script>
  <script type="text/babel" src="components/Catalog.jsx"></script>
  <script type="text/babel" src="components/BrandAbout.jsx"></script>
  <script type="text/babel" src="components/BrandVisualShowcase.jsx"></script>
  <script type="text/babel" src="components/BrandCertifications.jsx"></script>
  <script type="text/babel" src="components/BrandReasons.jsx"></script>
  <script type="text/babel" src="components/BrandFaq.jsx"></script>
  <script type="text/babel" src="components/ConseilCtaBand.jsx"></script>
  <script type="text/babel" src="components/RelatedBrands.jsx"></script>
  <script type="text/babel" src="components/PageJsonLd.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroVariant": "brandphoto"
    }/*EDITMODE-END*/;

    function App() {
      const brand = BRANDS[BRAND_KEY];
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.getElementById("root").classList.add("ready");
      }, []);

      const scrollTo = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 64, behavior: "smooth" });
      };

      return (
        <>
          <Topbar/>
          <Header onNavigate={() => {}}/>
          <main>
            <BrandHero
              brand={brand}
              variant={t.heroVariant}
              onScrollToGrid={() => scrollTo("produits")}
              onDevis={() => scrollTo("devis")}
            />
            <FilterBar/>
            <BestSellers brand={brand} onProduct={() => {}}/>
            <Catalog brand={brand} onProduct={() => {}}/>
            <BrandAbout brand={brand}/>
            <BrandCertifications brand={brand}/>
            <BrandReasons brand={brand}/>
            <BrandFaq brand={brand}/>
            <ConseilCtaBand brand={brand} onDevis={() => scrollTo("devis")}/>
            <PageJsonLd brand={brand}/>
          </main>
          <Footer/>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Hero">
              <TweakSelect
                label="Variant"
                value={t.heroVariant}
                options={[
                  { value: "classic",    label: "A · Classic (text + photo)" },
                  { value: "editorial",  label: "B · Editorial (type-only)" },
                  { value: "inverse",    label: "C · Inverse (black manifest)" },
                  { value: "fullbleed",  label: "D · Fullbleed (photo + band)" },
                  { value: "reversed",   label: "E · Reversed (split text)" },
                  { value: "brandphoto", label: "F · Brand photo (lifestyle)" },
                ]}
                onChange={(v) => setTweak("heroVariant", v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <!-- ====================================================================
       JSON-LD · sera complété en bas de page (FAQPage, BreadcrumbList,
       Product) à la fin de la construction de toutes les sections.
       ==================================================================== -->
</body>
</html>
